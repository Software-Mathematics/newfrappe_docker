# SMERP production stack for the VM (79.143.176.226).
# Same 9 services as smerp.yml, but:
#   - every app service uses the Nexus image (SMERP_IMAGE), not a local build
#   - frontend binds to 127.0.0.1:8080 only; host nginx + certbot terminate TLS
#     for erp.softwaremathematics.com and proxy to it.
# Deployed by deploy.sh:  SMERP_IMAGE=... docker compose -f smerp.prod.yml -p smerp up -d
services:
  backend:
    image: ${SMERP_IMAGE:-smerp:latest}
    networks: [frappe_network]
    deploy:
      restart_policy: { condition: on-failure }
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      MYSQL_ROOT_PASSWORD: admin
      MARIADB_ROOT_PASSWORD: admin

  configurator:
    image: ${SMERP_IMAGE:-smerp:latest}
    networks: [frappe_network]
    deploy:
      restart_policy: { condition: none }
    entrypoint: [bash, -c]
    command:
      - >
        ls -1 apps > sites/apps.txt;
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
        bench set-config -g redis_socketio "redis://$$REDIS_QUEUE";
        bench set-config -gp socketio_port $$SOCKETIO_PORT;
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      SOCKETIO_PORT: "9000"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

  create-site:
    image: ${SMERP_IMAGE:-smerp:latest}
    networks: [frappe_network]
    deploy:
      restart_policy: { condition: none }
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    entrypoint: [bash, -c]
    command:
      - >
        wait-for-it -t 120 db:3306;
        wait-for-it -t 120 redis-cache:6379;
        wait-for-it -t 120 redis-queue:6379;
        export start=`date +%s`;
        until [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".db_host // empty"` ]] && \
          [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_cache // empty"` ]] && \
          [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_queue // empty"` ]];
        do
          echo "Waiting for sites/common_site_config.json to be created";
          sleep 5;
          if (( `date +%s`-start > 120 )); then
            echo "could not find sites/common_site_config.json with required keys";
            exit 1
          fi
        done;
        echo "sites/common_site_config.json found";
        [[ -d sites/frontend ]] && echo "site 'frontend' already exists, skipping" || \
        bench new-site --mariadb-user-host-login-scope='%' --db-root-username=root --db-root-password=admin --admin-password=admin --install-app erpnext --set-default frontend;

  db:
    image: mariadb:10.6
    networks: [frappe_network]
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 5s
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      restart_policy: { condition: on-failure }
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MARIADB_ROOT_PASSWORD: admin
    volumes:
      - db-data:/var/lib/mysql

  frontend:
    image: ${SMERP_IMAGE:-smerp:latest}
    networks: [frappe_network]
    depends_on: [websocket]
    deploy:
      restart_policy: { condition: on-failure }
    command: [nginx-entrypoint.sh]
    environment:
      BACKEND: backend:8000
      FRAPPE_SITE_NAME_HEADER: frontend
      SOCKETIO: websocket:9000
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: 120
      CLIENT_MAX_BODY_SIZE: 50m
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    # bound to loopback only — host nginx (TLS) is the public entrypoint
    ports:
      - "127.0.0.1:8080:8080"

  queue-long:
    image: ${SMERP_IMAGE:-smerp:latest}
    networks: [frappe_network]
    deploy:
      restart_policy: { condition: on-failure }
    command: [bench, worker, --queue, "long,default,short"]
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    environment:
      FRAPPE_REDIS_CACHE: redis://redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://redis-queue:6379

  queue-short:
    image: ${SMERP_IMAGE:-smerp:latest}
    networks: [frappe_network]
    deploy:
      restart_policy: { condition: on-failure }
    command: [bench, worker, --queue, "short,default"]
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    environment:
      FRAPPE_REDIS_CACHE: redis://redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://redis-queue:6379

  redis-queue:
    image: redis:6.2-alpine
    networks: [frappe_network]
    deploy:
      restart_policy: { condition: on-failure }
    volumes:
      - redis-queue-data:/data

  redis-cache:
    image: redis:6.2-alpine
    networks: [frappe_network]
    deploy:
      restart_policy: { condition: on-failure }

  scheduler:
    image: ${SMERP_IMAGE:-smerp:latest}
    networks: [frappe_network]
    deploy:
      restart_policy: { condition: on-failure }
    command: [bench, schedule]
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

  websocket:
    image: ${SMERP_IMAGE:-smerp:latest}
    networks: [frappe_network]
    deploy:
      restart_policy: { condition: on-failure }
    command: [node, /home/frappe/frappe-bench/apps/frappe/socketio.js]
    environment:
      FRAPPE_REDIS_CACHE: redis://redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://redis-queue:6379
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

volumes:
  db-data:
  redis-queue-data:
  sites:
  logs:

networks:
  frappe_network:
    driver: bridge
