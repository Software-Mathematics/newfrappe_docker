# Host nginx reverse proxy for SMERP.
# Certbot (`certbot --nginx`) rewrites/adds the :443 server block and the
# HTTP->HTTPS redirect on first run, so this file only needs the :80 vhost
# proxying to the loopback-bound frontend container (127.0.0.1:8080).
server {
    listen 80;
    listen [::]:80;
    server_name erp.softwaremathematics.com;

    # ERPNext file uploads / imports
    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # websocket (socket.io realtime) upgrade
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
